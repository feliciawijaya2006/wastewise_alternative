<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #e5e5e5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
      }

      /* FRAME HP */
      .app-screen {
        width: 100%;
        max-width: 400px;
        min-height: 100vh;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <!-- FRAME MOBILE -->
    <div class="app-screen">
      <!-- Loading -->
      <div class="text-center px-6">
        <div
          class="w-10 h-10 border-4 border-gray-300 border-t-green-700 rounded-full animate-spin mx-auto mb-4"
        ></div>

        <p class="text-gray-500 text-sm font-medium">Memuat aplikasi...</p>
      </div>
    </div>

    <script>
      setTimeout(() => {
        const isLogin = localStorage.getItem("isLogin");

        window.location.replace(
          isLogin === "true" ? "./pages/dashboard.html" : "./pages/login.html",
        );
      }, 1000);
    </script>
  </body>
</html>
