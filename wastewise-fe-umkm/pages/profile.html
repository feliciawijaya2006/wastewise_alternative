<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .phone-frame {
        width: 100%;
        max-width: 375px;
        height: 812px;
        background: white;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div class="phone-frame pb-16">
      <!-- HEADER -->
      <div class="flex items-center justify-between mb-3 mt-2">
        <h1 class="text-xl font-semibold text-[#003d2b]">Profile</h1>
      </div>

      <!-- IMAGE -->
      <div class="relative mb-4">
        <img
          src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"
          class="w-full h-36 object-cover rounded-xl"
        />

        <!-- overlay -->
        <div
          class="absolute inset-0 flex items-center justify-center bg-black/10 rounded-xl"
        >
          <i class="fa fa-image text-white text-xl"></i>
        </div>

        <!-- Edit Button -->
        <div class="absolute bottom-2 right-2">
          <button
            class="w-9 h-9 bg-orange-500 rounded-full shadow flex items-center justify-center hover:scale-105 transition"
          >
            <i class="fa-solid fa-pen text-white text-xs"></i>
          </button>
        </div>
      </div>

      <!-- FORM -->
      <div class="space-y-3">
        <!-- Input Style -->
        <div>
          <label class="text-xs text-gray-500">Nama</label>
          <div
            class="flex items-center border border-green-700 rounded-lg px-3 py-2"
          >
            <i class="fa fa-user text-orange-500 text-sm mr-2"></i>
            <input
              type="text"
              value="Warung AW"
              class="w-full bg-transparent outline-none text-sm"
            />
          </div>
        </div>

        <div>
          <label class="text-xs text-gray-500">Lokasi</label>
          <div
            class="flex items-center border border-green-700 rounded-lg px-3 py-2"
          >
            <i class="fa fa-location-dot text-orange-500 text-sm mr-2"></i>
            <input
              type="text"
              value="Kantin UC Makassar"
              class="w-full bg-transparent outline-none text-sm"
            />
          </div>
        </div>

        <div>
          <label class="text-xs text-gray-500">Email</label>
          <div
            class="flex items-center border border-green-700 rounded-lg px-3 py-2"
          >
            <i class="fa fa-envelope text-orange-500 text-sm mr-2"></i>
            <input
              type="email"
              value="warungaw@student.ciputra.ac.id"
              class="w-full bg-transparent outline-none text-sm"
            />
          </div>
        </div>

        <div>
          <label class="text-xs text-gray-500">Telepon</label>
          <div
            class="flex items-center border border-green-700 rounded-lg px-3 py-2"
          >
            <i class="fa fa-phone text-orange-500 text-sm mr-2"></i>
            <input
              type="text"
              value="+62 812-7777-9999"
              class="w-full bg-transparent outline-none text-sm"
            />
          </div>
        </div>
      </div>

      <!-- LOGOUT -->
      <div class="mt-auto pt-4 mb-8">
        <button
          class="w-full bg-[#DD0000] text-white py-3 rounded-xl flex justify-center items-center gap-2 text-sm"
        >
          Log Out
          <i class="fa fa-right-from-bracket text-sm"></i>
        </button>
      </div>

      <!-- NAVBAR -->
      <div id="navbar"></div>
    </div>

    <!-- SCRIPT NAVBAR -->
    <script>
      fetch("../components/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;

          const path = window.location.pathname;

          document.querySelectorAll(".nav-item").forEach((item) => {
            const page = item.getAttribute("data-page");

            if (path.includes(page)) {
              item.classList.remove("text-gray-500");
              item.classList.add("text-[#003D2B]", "font-semibold");
            }
          });
        });
    </script>
  </body>
</html>
