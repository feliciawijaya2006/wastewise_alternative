<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifikasi</title>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .phone-frame {
        width: 100%;
        max-width: 375px;
        height: 812px;
        background: white;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>

  <body>
    <div class="phone-frame pb-20">
      <!-- HEADER -->
      <div class="mt-2 mb-2">
        <div class="flex items-center">
          <!-- BACK -->
          <button
            onclick="history.back()"
            class="w-10 h-10 rounded-full bg-[#f28a2c] flex items-center justify-center text-white text-xl shadow active:scale-95"
          >
            ‹
          </button>

          <h1 class="text-2xl font-bold text-[#003d2b] ml-4">
            Notifikasi
          </h1>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="flex-1 flex flex-col">
        <!-- TAB -->
        <div class="flex w-full bg-gray-100 p-[4px] rounded-full shadow-inner mt-4">
          <button
            class="tab-btn flex-1 py-1 rounded-full text-xs font-medium bg-[#003d2b] text-white text-center transition-all duration-200"
            data-tab="semua"
          >
            Semua
          </button>

          <button
            class="tab-btn flex-1 py-1 rounded-full text-xs font-medium text-gray-500 text-center transition-all duration-200"
            data-tab="pesanan"
          >
            Pesanan
          </button>

          <button
            class="tab-btn flex-1 py-1 rounded-full text-xs font-medium text-gray-500 text-center transition-all duration-200"
            data-tab="promosi"
          >
            Promosi
          </button>
        </div>

        <!-- LIST -->
        <div
          id="notif-container"
          class="mt-3 space-y-2 overflow-y-auto no-scrollbar pr-1"
        ></div>
      </div>
    </div>

    <script>
      const tabs = document.querySelectorAll(".tab-btn");
      const container = document.getElementById("notif-container");

      let allNotifications = [];

      // ================= FETCH =================
      async function fetchNotifications() {
        try {
          // SIMULASI DATA (ganti ke API nanti)
          const data = [
            {
              id: 1,
              type: "pesanan",
              title: "Pesanan Baru Masuk",
              message: "Pesanan #21 dari Andi telah dibuat",
              time: "1 menit yang lalu",
              icon: "fa-bell",
              color: "orange",
            },
            {
              id: 2,
              type: "pesanan",
              title: "Pesanan Selesai",
              message: "Pesanan #18 sudah selesai diproses",
              time: "10 menit yang lalu",
              icon: "fa-check",
              color: "green",
            },
            {
              id: 3,
              type: "promosi",
              title: "Promo Baru!",
              message: "Diskon 50% untuk produk tertentu",
              time: "30 menit yang lalu",
              icon: "fa-tags",
              color: "blue",
            },
          ];

          allNotifications = data;
          renderNotifications("semua");
        } catch (err) {
          console.error("Error:", err);
        }
      }

      // ================= RENDER =================
      function renderNotifications(filter) {
        container.innerHTML = "";

        let filtered = allNotifications;

        if (filter !== "semua") {
          filtered = allNotifications.filter((n) => n.type === filter);
        }

        if (filtered.length === 0) {
          container.innerHTML = `
            <p class="text-center text-gray-400 text-sm mt-5">
              Tidak ada notifikasi
            </p>
          `;
          return;
        }

        filtered.forEach((notif) => {
          const colorMap = {
            orange: "bg-orange-100 text-orange-500",
            green: "bg-green-100 text-green-600",
            blue: "bg-blue-100 text-blue-500",
          };

          const item = `
            <div class="bg-white border border-gray-100 rounded-xl px-3 py-2 shadow-sm flex items-start gap-2">
              
              <div class="w-8 h-8 ${colorMap[notif.color]} flex items-center justify-center rounded-full text-sm">
                <i class="fa-solid ${notif.icon}"></i>
              </div>

              <div class="flex-1 leading-tight">
                <p class="text-sm font-semibold text-gray-800">${notif.title}</p>
                <p class="text-xs text-gray-500">${notif.message}</p>
                <p class="text-[10px] text-gray-400 mt-0.5">${notif.time}</p>
              </div>

            </div>
          `;

          container.innerHTML += item;
        });
      }

      // ================= TAB =================
      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          const selected = tab.dataset.tab;

          tabs.forEach((t) => {
            t.classList.remove("bg-[#003d2b]", "text-white", "shadow-sm");
            t.classList.add("text-gray-500");
          });

          tab.classList.add("bg-[#003d2b]", "text-white", "shadow-sm");
          tab.classList.remove("text-gray-500");

          renderNotifications(selected);
        });
      });

      // INIT
      fetchNotifications();
    </script>
  </body>
</html>
