<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Menu</title>

    <!-- FONT AWESOME -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Inter", sans-serif;
      }

      .phone-frame {
        width: 100%;
        max-width: 375px;
        height: 812px;
        background: white;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="phone-frame">
      <!-- HEADER -->
      <div class="flex items-center mb-4">
        <button
          onclick="history.back()"
          class="w-10 h-10 rounded-full bg-[#f28a2c] flex items-center justify-center text-white text-xl shadow active:scale-95"
        >
          ‹
        </button>
        <h1 class="text-xl font-bold text-[#003d2b] ml-4">Tambah Menu</h1>
      </div>

      <!-- FORM -->
      <div class="flex-1 overflow-y-auto no-scrollbar pr-1 space-y-4">
        <!-- FOTO -->
        <div>
          <p class="text-sm font-semibold text-gray-700 mb-2">Foto Menu</p>

          <label
            class="w-full h-36 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center text-gray-400 cursor-pointer overflow-hidden relative"
          >
            <input type="file" id="imageInput" class="hidden" />

            <img
              id="preview"
              class="absolute w-full h-full object-cover hidden"
            />

            <div id="placeholder" class="flex flex-col items-center">
              <i class="fa-solid fa-image text-2xl mb-1"></i>
              <span class="text-xs">Upload Gambar</span>
            </div>
          </label>
        </div>

        <!-- NAMA -->
        <div>
          <p class="text-sm font-semibold text-gray-700 mb-1">Nama Menu</p>
          <input
            type="text"
            id="nama"
            placeholder="Contoh: Ayam Geprek"
            class="w-full px-3 py-2 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-[#003d2b]"
          />
        </div>

        <!-- HARGA -->
        <div>
          <p class="text-sm font-semibold text-gray-700 mb-1">Harga</p>
          <input
            type="number"
            id="harga"
            placeholder="Contoh: 15000"
            class="w-full px-3 py-2 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-[#003d2b]"
          />
        </div>

        <!-- KATEGORI -->
        <div>
          <p class="text-sm font-semibold text-gray-700 mb-1">Kategori</p>
          <select
            id="kategori"
            class="w-full px-3 py-2 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-[#003d2b]"
          >
            <option value="">Pilih kategori</option>
            <option value="makanan">Makanan</option>
            <option value="minuman">Minuman</option>
            <option value="snack">Snack</option>
          </select>
        </div>

        <!-- DESKRIPSI -->
        <div>
          <p class="text-sm font-semibold text-gray-700 mb-1">Deskripsi</p>
          <textarea
            id="deskripsi"
            rows="3"
            placeholder="Deskripsi menu..."
            class="w-full px-3 py-2 rounded-lg border text-sm focus:outline-none focus:ring-2 focus:ring-[#003d2b]"
          ></textarea>
        </div>
      </div>

      <!-- BUTTON -->
      <div class="mt-4">
        <button
          onclick="submitMenu()"
          class="w-full bg-[#003d2b] text-white py-2 rounded-full text-sm font-semibold shadow active:scale-95"
        >
          Simpan Menu
        </button>
      </div>
    </div>

    <script>
      const imageInput = document.getElementById("imageInput");
      const preview = document.getElementById("preview");
      const placeholder = document.getElementById("placeholder");

      // PREVIEW GAMBAR
      imageInput.addEventListener("change", function () {
        const file = this.files[0];

        if (file) {
          const reader = new FileReader();

          reader.onload = function (e) {
            preview.src = e.target.result;
            preview.classList.remove("hidden");
            placeholder.classList.add("hidden");
          };

          reader.readAsDataURL(file);
        }
      });

      // SUBMIT
      function submitMenu() {
        const nama = document.getElementById("nama").value;
        const harga = document.getElementById("harga").value;
        const kategori = document.getElementById("kategori").value;
        const deskripsi = document.getElementById("deskripsi").value;

        if (!nama || !harga || !kategori) {
          alert("Harap lengkapi data!");
          return;
        }

        const data = {
          nama,
          harga,
          kategori,
          deskripsi,
        };

        console.log("DATA MENU:", data);

        // SIMULASI SUCCESS
        alert("Menu berhasil ditambahkan!");

        // RESET
        document.getElementById("nama").value = "";
        document.getElementById("harga").value = "";
        document.getElementById("kategori").value = "";
        document.getElementById("deskripsi").value = "";
        preview.classList.add("hidden");
        placeholder.classList.remove("hidden");
      }
    </script>
  </body>
</html>
