<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteWise - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f3f4f6; 
        }
        .primary-btn { 
            background-color: #1f2937; 
            color: white; 
        }
        .primary-btn:hover {
            background-color: #111827;
        }
        .primary-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        .input-error {
            border-color: #ef4444 !important;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- Container HP -->
    <div class="w-full max-w-[375px] bg-white h-[812px] rounded-3xl shadow-xl overflow-hidden relative flex flex-col p-6">
        
        <!-- Header -->
        <div class="flex-1 flex flex-col justify-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Masuk</h1>
            <p class="text-gray-500 text-sm mb-8">Silakan masuk akunmu untuk melanjutkan</p>

            <!-- Form dengan ID -->
            <form id="loginForm" class="space-y-4" novalidate>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">No. Handphone</label>
                    <input 
                        type="tel" 
                        id="phoneInput"
                        placeholder="08xxxxxxxxxx" 
                        maxlength="13"
                        class="w-full p-3 border rounded-xl text-sm focus:outline-none focus:border-green-500"
                    >
                    <p id="phoneError" class="error-message hidden">Nomor handphone harus angka dan minimal 10 digit</p>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Kata Sandi</label>
                    <input 
                        type="password" 
                        id="passwordInput"
                        placeholder="Masukkan sandi" 
                        minlength="6"
                        class="w-full p-3 border rounded-xl text-sm focus:outline-none focus:border-green-500"
                    >
                    <p id="passwordError" class="error-message hidden">Password minimal 6 karakter</p>
                </div>

                <div class="text-right">
                    <a href="#" class="text-xs text-green-600 font-semibold">LUPA KATA SANDI</a>
                </div>

                <button 
                    type="submit" 
                    id="loginButton"
                    class="w-full primary-btn py-3 rounded-xl font-bold mt-2 transition"
                >
                    Masuk
                </button>
            </form>

            <!-- Social Login -->
            <div class="mt-8 text-center">
                <p class="text-xs text-gray-400 mb-4">Atau masuk dengan</p>
                <div class="flex justify-center gap-4">
                    <button onclick="socialLogin('google')" class="p-3 border rounded-full hover:bg-gray-50 transition">
                        <i class="fab fa-google text-red-500"></i>
                    </button>
                    <button onclick="socialLogin('facebook')" class="p-3 border rounded-full hover:bg-gray-50 transition">
                        <i class="fab fa-facebook text-blue-600"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer Link -->
        <div class="text-center pb-4">
            <p class="text-sm text-gray-500">Belum punya akun? <a href="#" class="text-green-600 font-bold">Daftar</a></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
