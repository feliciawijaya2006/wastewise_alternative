<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pemesanan - WasteWise</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003D2B',
                        accent: '#EF8030',
                    }
                }
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }
        
        body {
            background: #F8F9FA;
        }
        
        .phone-container {
            max-width: 375px;
            min-height: 812px;
            margin: 0 auto;
            background: white;
            position: relative;
        }
        
        .tab-btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #E5E7EB;
            background: #F3F4F6;
            color: #6B7280;
        }
        
        .tab-btn.active {
            background: #003D2B;
            color: white;
            border-color: #003D2B;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-berlangsung {
            background: #FFF7ED;
            color: #EF8030;
        }
        
        .status-selesai {
            background: #003D2B;
            color: white;
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <!-- Header -->
        <div class="px-5 pt-12 pb-4 border-b sticky top-0 bg-white z-10">
            <h1 class="text-2xl font-bold text-primary">Riwayat Pemesanan</h1>
        </div>

        <!-- Tabs -->
        <div class="px-5 py-4 flex gap-2 sticky top-[88px] bg-white z-10 border-b">
            <button onclick="switchTab('semua')" id="tab-semua" class="tab-btn active">Semua</button>
            <button onclick="switchTab('berlangsung')" id="tab-berlangsung" class="tab-btn">Berlangsung</button>
            <button onclick="switchTab('selesai')" id="tab-selesai" class="tab-btn">Selesai</button>
        </div>

        <!-- Order List -->
        <div class="p-5 pb-24" id="order-list">
            <!-- Orders will be rendered here by JavaScript -->
        </div>

        <div class="px-5 pb-24 pt-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Riwayat Pesanan</h1>

            <div id="history-container" class="space-y-4">
            </div>

            <div id="empty-history" class="hidden text-center py-10 mt-10">
                <div class="w-20 h-20 bg-gray-100 rounded-full mx-auto mb-4 flex items-center justify-center">
                    <i class="fas fa-receipt text-3xl text-gray-400"></i>
                </div>
                <p class="text-gray-500 text-sm">Belum ada riwayat pesanan.</p>
                <button onclick="window.location.href='dashboard.html'" class="mt-4 text-primary font-semibold text-sm">
                    Mulai Belanja →
                </button>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-history" class="hidden text-center py-10">
            <div class="w-24 h-24 bg-gray-200 rounded-full mx-auto mb-4 flex items-center justify-center">
                <i class="fas fa-receipt text-4xl text-gray-400"></i>
            </div>
            <p class="text-gray-500 text-sm">Belum ada riwayat pemesanan</p>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] bg-white border-t px-6 py-4 flex justify-between items-center z-20">
            <a href="dashboard.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-medium">Beranda</span>
            </a>
            <a href="cart.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition relative">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span class="text-[10px] font-medium">Keranjang</span>
                <span id="cart-badge" class="hidden absolute -top-1 right-2 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </a>
            <a href="history.html" class="flex flex-col items-center gap-1 text-primary transition">
                <i class="fas fa-receipt text-xl"></i>
                <span class="text-[10px] font-medium">Riwayat</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition">
                <i class="fas fa-user text-xl"></i>
                <span class="text-[10px] font-medium">Profil</span>
            </a>
        </div>
    </div>

    <script src="../js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async() => {
            requireAuth();

            const container = document.getElementById('history-container');

            // Note: You have two elements with id="empty-history" in your HTML. 
            // querySelectorAll ensures we hide/show both of them safely.
            const emptyStates = document.querySelectorAll('#empty-history');

            // Show loading text
            container.innerHTML = '<p class="text-center text-gray-500 text-sm py-10">Memuat riwayat pesanan...</p>';

            try {
                // Fetch from Laravel API
                const result = await apiFetch('/api/pesanan');

                container.innerHTML = ''; // Clear loading text

                // FIXED LOGIC: result is the JSON object. We just need to check if result.data exists and has items!
                if (result && result.data && result.data.length > 0) {
                    const orders = result.data;
                    let htmlContent = '';

                    orders.forEach(order => {
                        let statusBadge = '';
                        if (order.Status === 0) {
                            statusBadge = '<span class="bg-yellow-100 text-yellow-700 text-[10px] px-2 py-1 rounded font-bold">Diproses</span>';
                        } else if (order.Status === 1) {
                            statusBadge = '<span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded font-bold">Selesai</span>';
                        } else {
                            statusBadge = '<span class="bg-red-100 text-red-700 text-[10px] px-2 py-1 rounded font-bold">Dibatalkan</span>';
                        }

                        // Protect against deleted menus
                        const itemString = order.detail && order.detail.length > 0 ?
                            order.detail.map(d => `${d.NamaMenu} x${d.Jumlah}`).join(', ') :
                            'Detail tidak tersedia';

                        // Clean up the date string (e.g., "2026-05-15")
                        const shortDate = order.Tgl ? order.Tgl.substring(0, 10) : 'Tanggal tidak valid';

                        htmlContent += `
                            <div class="bg-white border border-gray-200 rounded-2xl p-4 shadow-sm mb-4">
                                <div class="flex justify-between items-start mb-3 border-b pb-3">
                                    <div>
                                        <p class="text-xs text-gray-400 mb-1">${order.NoPesanan} • ${shortDate}</p>
                                        <h3 class="font-bold text-gray-800 text-sm">${order.NamaResto}</h3>
                                    </div>
                                    ${statusBadge}
                                </div>
                                <div class="mb-3">
                                    <p class="text-xs text-gray-600 line-clamp-2">${itemString}</p>
                                </div>
                                <div class="flex justify-between items-center pt-2">
                                    <span class="text-xs text-gray-500">Total Belanja</span>
                                    <span class="font-bold text-primary text-sm">Rp${(order.Total + 500).toLocaleString('id-ID')}</span>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = htmlContent;

                    // Hide the empty state since we have data
                    emptyStates.forEach(el => el.classList.add('hidden'));

                } else {
                    // Show empty state if the data array is empty
                    emptyStates.forEach(el => el.classList.remove('hidden'));
                }
            } catch (error) {
                console.error("Critical History Error:", error);
                container.innerHTML = '<p class="text-center text-red-500 text-sm py-10">Gagal memuat data. Silahkan refresh halaman.</p>';
            }
        });
    </script>
</body>

</html>
